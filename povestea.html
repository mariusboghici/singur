<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Povestea ta – singur</title>
    <link rel="stylesheet" href="style.css">
    <style>
        textarea {
            width: 100%;
            height: 180px;
            background: #0f0f11;
            color: #f2f2f2;
            border: 1px solid #3a3a3d;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            resize: none;
            margin-bottom: 1.5rem;
        }

        select {
            width: 100%;
            padding: 0.8rem;
            background: #0f0f11;
            color: #f2f2f2;
            border: 1px solid #3a3a3d;
            border-radius: 12px;
            margin-bottom: 1.2rem;
            font-size: 1rem;
        }

        #ritual {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 400ms ease-out;
        }
    </style>
</head>

<body>
    <div class="main">
        <h2>Povestea ta</h2>
        <p>Scrie aici ce porți cu tine. Nu trebuie să fie perfect. Nu trebuie să fie frumos. Doar sincer.</p>

        <textarea id="text" placeholder="Scrie aici..."></textarea>

        <select id="varsta">
            <option value="">Vârstă (opțional)</option>
            <option>18–24</option>
            <option>25–34</option>
            <option>35–44</option>
            <option>45–54</option>
            <option>55+</option>
        </select>

        <select id="gen">
            <option value="">Gen (opțional)</option>
            <option>Femeie</option>
            <option>Bărbat</option>
            <option>Prefer să nu spun</option>
        </select>

        <select id="locatie">
            <option value="">Regiune (opțional)</option>
            <option>Moldova</option>
            <option>Transilvania</option>
            <option>Muntenia</option>
            <option>Dobrogea</option>
            <option>Banat</option>
            <option>Crișana</option>
            <option>Oltenia</option>
            <option>Altundeva</option>
        </select>

        <div class="buttons" id="sendButtons">
            <button class="primary" onclick="trimite()">Trimite</button>
        </div>

        <div id="ritual">
            <h2>Mulțumesc.</h2>
            <p>Povestea ta a fost păstrată aici, în locul tău.  
            Nu pleacă nicăieri. Nu o citește nimeni.  
            Rămâne doar cu tine.</p>

            <div class="buttons">
                <a href="index.html">
                    <button class="secondary">Înapoi acasă</button>
                </a>
            </div>
        </div>
    </div>

    <footer>© 2026 singur</footer>

    <script>
        function trimite() {
            const poveste = document.getElementById("text").value.trim();
            const varsta = document.getElementById("varsta").value;
            const gen = document.getElementById("gen").value;
            const locatie = document.getElementById("locatie").value;

            if (!poveste) {
                alert("Scrie măcar câteva cuvinte.");
                return;
            }

            const data = {
                poveste,
                varsta,
                gen,
                locatie,
                timestamp: new Date().toISOString()
            };

            localStorage.setItem("povestea_ta", JSON.stringify(data));

            document.getElementById("ritual").style.display = "block";
            document.getElementById("sendButtons").style.display = "none";
        }
    </script>
</body>
</html>
