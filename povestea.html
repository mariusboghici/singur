<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Scrie povestea ta — singur.blog</title>

    <!-- SEO -->
    <meta name="description" content="Scrie povestea ta în liniște. Totul rămâne doar în dispozitivul tău.">
    <meta name="keywords" content="scrie poveste, anonim, singur, jurnal, emotii">
    <link rel="canonical" href="https://singur.blog/povestea.html">

    <!-- OpenGraph -->
    <meta property="og:title" content="Scrie povestea ta — singur.blog">
    <meta property="og:description" content="Un loc sigur unde poți scrie povestea ta. Gratuit și anonim.">
    <meta property="og:image" content="https://singur.blog/og.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="main">
        <h1>Scrie povestea ta</h1>

        <label for="text" style="opacity:0.7;">Povestea ta</label>
        <textarea id="text" aria-label="Scrie povestea ta aici"></textarea>

        <button class="primary" id="save" aria-label="Salvează povestea">Salvează</button>
        <a href="index.html"><button class="secondary" aria-label="Înapoi la început">Înapoi</button></a>
    </main>

    <footer>
        © 2026 singur — creat de 
        <a href="tel:+40774022381" style="color: inherit; text-decoration: none; cursor: pointer; opacity: 0.8;">
            MRB
        </a>

        <small id="counter" style="opacity:0.4; margin-left:8px;"></small>
    </footer>

    <script>
        // încărcăm povestea dacă există
        const textarea = document.getElementById("text");
        textarea.value = localStorage.getItem("povestea_ta") || "";

        // salvare
        document.getElementById("save").onclick = () => {
            localStorage.setItem("povestea_ta", textarea.value.trim());
            alert("Povestea a fost salvată.");
        };

        // contor vizitatori
        fetch("https://api.countapi.xyz/hit/singur.blog/visits")
            .then(r => r.json())
            .then(d => document.getElementById("counter").textContent = d.value);
    </script>
</body>
</html>
