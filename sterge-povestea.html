<html lang="ro">
<head>
    <meta charset="UTF-8">

    <title>Șterge povestea – singur</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <h2>Ești sigur?</h2>
        <p>Povestea ta e doar a ta. Dacă o ștergi, dispare pentru totdeauna din acest loc.</p>

        <div class="buttons" id="buttons">
            <button class="primary" onclick="sterge()">Da, șterge</button>
            <a href="povestea-ta.html"><button class="secondary">Nu, mă întorc</button></a>
        </div>

        <div id="done" style="display:none; margin-top:2rem;">
            <h2>A fost eliberată.</h2>
            <p>Uneori, să lași ceva să plece e tot ce poți face.</p>
            <a href="index.html"><button class="secondary">Înapoi acasă</button></a>
        </div>
    </div>

   <footer>

    <a href="tel:+40774022381"
       style="color: inherit; text-decoration: none; cursor: pointer; opacity: 0.8;">
       MRB
    </a>

    <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 0.5rem;">
        Povestea ta nu este trimisă pe internet. Este salvată doar în dispozitivul tău.
    </p>
</footer>


    <script>
        function sterge() {
            localStorage.removeItem("povestea_ta");
            document.getElementById("buttons").style.display = "none";
            document.getElementById("done").style.display = "block";
        }
    </script>
</body>
